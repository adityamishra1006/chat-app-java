server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
              - Path=/users/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

jwt:
  secret: ${JWT_SECRET}
#  secret: ju78Hj28Gc5GdsEBA2MBmpDXGrsql5CDmmtw1Ix9Xn890zqFPyPF62qjb03laehb+S0fKRQRblNg9NeYKbZCUQ==


logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO